<!DOCTYPE html>
<html lang="nl">

<head>

    <title>Steen Papier Schaar</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <h1>Steen Papier Schaar</h1>
    <p>
        <!-- Computer -->
        <h2>Computer:</h2>
        <h3><span id="computer-keuze"></span></h3>
    </p>
    <p>
        <!-- player -->
        <h2>Speler:</h2>
        <h3><span id="speler-keuze"></span></h3>

        <!-- result -->
        <h2>Uitkomst:</h2>
        <h3><span id="resultaat"></span></h3>

        <!-- Buttons -->
    <button id="Steen" class="button">Steen</button>
    <button id="Papier" class="button">Papier</button>
    <button id="Schaar" class="button">Schaar</button>
        <!-- call JavaScript -->
    <script src="Javascript.js"></script>
</body>
</html>
