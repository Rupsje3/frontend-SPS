<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <title>Steen Papier Schaar</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <h1>Steen Papier Schaar</h1>
    <div class="container">
        <!-- Computer -->
        <div class="title">Computer:</div>
        <div class="result" id="computer-keuze"></div>
    </div>
    <div class="container">
        <!-- player -->
        <div class="title">Speler:</div>
        <div class="result" id="speler-keuze"></div>
    </div>
    <div class="container">
        <!-- result -->
        <div class="title">Uitkomst:</div>
        <div class="result" id="resultaat"></div>
    </div>
    <div class="button-container">
            <!-- Buttons -->
        <button id="Steen" class="button">
            <img src="Images/Steen.png" width="150" height="150" alt="Steen">
            <span>Steen</span>
        </button>
        <button id="Papier" class="button">
            <img src="Images/Papier.png" width="150" height="150" alt="Papier">
            <span>Papier</span>
        </button>
        <button id="Schaar" class="button">
            <img src="Images/Schaar.png" width="150" height="150" alt="Schaar">
            <span>Schaar</span>
        </button>
    </div>
        <!-- call JavaScript -->
    <script src="Javascript.js"></script>
</body>
</html>
