<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <title>Steen Papier Schaar</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <div class="score-container">

        <div class="score-box">
            <p>Score speler: <span id="spelerScore">0</span></p>
            <p>Score computer: <span id="computerScore">0</span></p>
        </div>

        <div class="streak-box">
            <p class="streak-label">
                Win streak: <span id="winStreak">0</span>
            </p>

            <p class="streak-label">
                Hoogste streak: <span id="hoogsteStreak">0</span>
            </p>
        </div>

    </div>
    <h1>Steen Papier Schaar</h1>
    <div class="container">
        <!-- Computer -->
        <div class="title">Computer:</div>
        <div class="result" id="computer-keuze"></div>
    </div>
    <div class="container">
        <!-- player -->
        <div class="title">Speler:</div>
        <div class="result" id="speler-keuze"></div>
    </div>
    <div class="container">
        <!-- result -->
        <div class="title">Uitkomst:</div>
        <div class="result" id="resultaat"></div>
    </div>
    <div class="button-container">
            <!-- Buttons -->
        <button id="Steen" class="button">
            <img src="Images/Steen.png" width="150" height="150" alt="Steen"><br>
            <span>Steen</span>
        </button>
        <button id="Papier" class="button">
            <img src="Images/Papier.png" width="150" height="150" alt="Papier"><br>
            <span>Papier</span>
        </button>
        <button id="Schaar" class="button">
            <img src="Images/Schaar.png" width="150" height="150" alt="Schaar"><br>
            <span>Schaar</span>
        </button>
    </div>
        <!-- geluiden -->
    <div>
        <audio id="winSound" src="Audio/Win.mp3"></audio>
        <audio id="loseSound" src="Audio/Lose.mp3"></audio>
        <audio id="drawSound" src="Audio/Draw.mp3"></audio>
    </div>
        <!-- call JavaScript -->
    <script src="Javascript.js"></script>
</body>
</html>
