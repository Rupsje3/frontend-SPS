<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <title>Steen Papier Schaar</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <h1>Steen Papier Schaar</h1>
    <div class="container">
        <!-- Computer -->
        <div class="title">Computer:</div>
        <div class="result" id="computer-keuze"></div>
    </div>
    <div class="container">
        <!-- player -->
        <div class="title">Speler:</div>
        <div class="result" id="speler-keuze"></div>
    </div>
    <div class="container">
        <!-- result -->
        <div class="title">Uitkomst:</div>
        <div class="result" id="resultaat"></div>
    </div>
        <!-- Buttons -->
    <button id="Steen" class="button">Steen</button>
    <button id="Papier" class="button">Papier</button>
    <button id="Schaar" class="button">Schaar</button>
        <!-- call JavaScript -->
    <script src="Javascript.js"></script>
</body>
</html>
